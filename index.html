<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI - Perfect Workspace</title>
    <style>
        :root {
            --bg-body: #0b0b0c;
            --bg-sidebar: #050505;
            --bg-chat: #131316;
            --bg-user-msg: #1d1d24;
            --text-main: #ececec;
            --text-secondary: #9f9fa6;
            --accent-green: #10a37f;
            --accent-glow: rgba(16, 163, 127, 0.3);
            --border-color: #242429;
            --card-hover: #1b1b22;
            --neon-purple: #a855f7;
        }

        body.light-mode {
            --bg-body: #f4f4f7;
            --bg-sidebar: #eaeaea;
            --bg-chat: #ffffff;
            --bg-user-msg: #e8e8f0;
            --text-main: #131316;
            --text-secondary: #60606a;
            --accent-green: #0a8565;
            --accent-glow: rgba(10, 133, 101, 0.2);
            --border-color: #d1d1db;
            --card-hover: #f0f0f5;
            --neon-purple: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; }
        body { display: flex; height: 100vh; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; position: relative; }
        
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -50px;
            right: -50px;
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 10s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        /* 👑 Glowing Logo Styles */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .glowing-svg {
            filter: drop-shadow(0 0 6px var(--accent-green));
            animation: pulseLogo 3s infinite alternate;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); filter: drop-shadow(0 0 4px var(--accent-green)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 10px var(--neon-purple)); }
        }

        .sidebar { width: 260px; background-color: var(--bg-sidebar); padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; }
        .sidebar-top { display: flex; flex-direction: column; gap: 15px; height: 80%; }
        
        .brand-logo { font-size: 20px; font-weight: 700; text-align: center; background: linear-gradient(90deg, var(--text-main), var(--accent-green), var(--neon-purple), var(--text-main)); background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shineText 6s linear infinite; }
        @keyframes shineText { to { background-position: 300% center; } }
        
        .new-chat-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); padding: 12px 14px; border-radius: 12px; cursor: pointer; text-align: left; font-size: 14px; width: 100%; display: flex; align-items: center; justify-content: space-between; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .new-chat-btn:hover { background-color: var(--card-hover); border-color: var(--accent-green); box-shadow: 0 0 15px var(--accent-glow); transform: scale(1.02); }
        .new-chat-btn:active { transform: scale(0.98); }
        
        .history-section { flex: 1; overflow-y: auto; margin-top: 10px; display: flex; flex-direction: column; gap: 6px; padding-right: 4px; }
        .history-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin: 10px 0 5px 5px; letter-spacing: 0.5px; }
        
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 8px; cursor: pointer; color: var(--text-main); font-size: 14px; border: 1px solid transparent; transition: all 0.2s ease; }
        .history-item:hover { background-color: var(--bg-chat); transform: translateX(3px); }
        .history-item.active { background-color: var(--card-hover); border-color: var(--border-color); font-weight: 500; box-shadow: inset 3px 0 0 var(--accent-green); }
        
        .history-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 80%; display: flex; align-items: center; gap: 8px; }
        .delete-history-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; opacity: 0; font-size: 12px; transition: opacity 0.2s, color 0.2s; }
        .history-item:hover .delete-history-btn { opacity: 1; }
        .delete-history-btn:hover { color: #ff4a4a !important; }

        .sidebar-footer { padding: 12px 4px; border-top: 1px solid var(--border-color); font-size: 13px; color: var(--text-secondary); display: flex; flex-direction: column; gap: 8px; }
        .dev-badge { font-size: 11px; font-weight: 700; background: linear-gradient(45deg, #10a37f, #a855f7); color: #fff; padding: 5px 8px; border-radius: 6px; text-align: center; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.25); }

        .chat-container { flex: 1; display: flex; flex-direction: column; height: 100%; background-color: var(--bg-body); position: relative; min-width: 0; z-index: 2; }
        .chat-header { padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; background-color: rgba(11, 11, 12, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); z-index: 5; }
        .header-controls { display: flex; align-items: center; gap: 8px; }
        
        .model-select, .lang-select { background: var(--bg-chat); color: var(--text-main); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 20px; font-size: 13px; outline: none; cursor: pointer; font-weight: 500; transition: all 0.3s ease; }
        .model-select:hover, .lang-select:hover { border-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-glow); }
        .theme-toggle { background: transparent; border: none; font-size: 18px; cursor: pointer; color: var(--text-main); padding: 4px; transition: transform 0.3s ease; }
        .theme-toggle:hover { transform: rotate(45deg) scale(1.1); }

        .welcome-screen { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 720px; padding: 0 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 24px; animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes scaleIn {
            from { transform: translate(-50%, -45%) scale(0.96); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .welcome-logo-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .welcome-logo { font-size: 46px; font-weight: 800; background: linear-gradient(45deg, #10a37f, #4285f4, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 15px rgba(16, 163, 127, 0.15)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .welcome-tagline { font-size: 24px; font-weight: 500; color: var(--text-main); }
        
        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; width: 100%; margin-top: 15px; }
        .suggest-card { background-color: var(--bg-chat); border: 1px solid var(--border-color); border-radius: 16px; padding: 18px; text-align: left; cursor: pointer; font-size: 14px; color: var(--text-main); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; overflow: hidden; }
        .suggest-card:hover { background-color: var(--card-hover); border-color: var(--neon-purple); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(168, 85, 247, 0.12); }
        .suggest-card span { display: block; font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 0 140px 0; display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        .message-row { width: 100%; display: flex; padding: 16px 20px; justify-content: center; position: relative; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content { width: 100%; max-width: 720px; display: flex; gap: 18px; line-height: 1.6; font-size: 15px; word-wrap: break-word; flex-direction: column; }
        .message-main-body { display: flex; gap: 18px; width: 100%; }

        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; flex-shrink: 0; }
        .user-avatar { background-color: #543da0; color: #fff; margin-left: auto; box-shadow: 0 4px 10px rgba(84, 61, 160, 0.3); }
        .ai-avatar { background-color: var(--accent-green); color: #fff; font-size: 16px; box-shadow: 0 4px 10px rgba(16, 163, 127, 0.3); }

        .text-block { flex: 1; color: var(--text-main); padding-top: 2px; }
        .user-row .text-block { background-color: var(--bg-user-msg); padding: 12px 18px; border-radius: 20px 4px 20px 20px; max-width: 75%; margin-left: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); white-space: pre-wrap; }
        .user-row .message-main-body { justify-content: flex-end; }
        
        .text-block p { margin-bottom: 12px; }
        .text-block ul, .text-block ol { margin-left: 24px; margin-top: 6px; margin-bottom: 12px; }
        .text-block li { margin-bottom: 6px; }
        .text-block b { font-weight: 600; color: var(--accent-green); }
        .light-mode .text-block b { color: var(--text-main); font-weight: 700; }

        .msg-action-area { display: flex; gap: 12px; margin-top: 4px; padding-left: 50px; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; transform: translateY(5px); }
        .message-row:hover .msg-action-area { opacity: 1; transform: translateY(0); }
        .user-row .msg-action-area { justify-content: flex-end; padding-left: 0; padding-right: 12px; }
        
        .action-link { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; transition: all 0.2s ease; }
        .action-link:hover { color: var(--accent-green); background-color: var(--card-hover); }

        pre { background-color: #060608; color: #e3e3e3; padding: 14px; border-radius: 12px; margin: 12px 0; overflow-x: auto; position: relative; font-family: monospace; border: 1px solid var(--border-color); }
        .copy-btn { position: absolute; right: 10px; top: 10px; background: #2f2f35; border: none; color: #b4b4b4; padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .copy-btn:hover { background-color: var(--accent-green); color: #fff; }

        .chat-input-area { position: absolute; bottom: 0; left: 0; width: 100%; padding: 0 20px 24px 20px; background: linear-gradient(transparent 0%, var(--bg-body) 30%); display: flex; justify-content: center; z-index: 5; }
        .input-wrapper { width: 100%; max-width: 720px; background-color: var(--bg-chat); border: 1px solid var(--border-color); border-radius: 28px; padding: 8px 14px; display: flex; align-items: center; gap: 12px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .input-wrapper:focus-within { border-color: var(--accent-green); box-shadow: 0 0 25px var(--accent-glow); transform: translateY(-2px); }
        
        .chat-input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 16px; outline: none; padding: 8px 4px; }
        .icon-btn { background: transparent; border: none; color: var(--text-secondary); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .icon-btn:hover { background-color: var(--card-hover); color: var(--accent-green); transform: scale(1.1); }
        
        .send-btn { background-color: var(--text-main); color: var(--bg-body); width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 18px; font-weight: bold; transition: all 0.3s ease; }
        .chat-input:not(:placeholder-shown) ~ .send-btn { background-color: var(--accent-green); color: #fff; box-shadow: 0 0 15px var(--accent-green); transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }

        .typing-dots { display: inline-flex; gap: 5px; height: 20px; align-items: center; }
        .dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; animation: wave 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-4px); opacity: 1; } }
        
        .live-typing-cursor::after { content: '▋'; color: var(--accent-green); animation: blink 0.7s infinite; margin-left: 4px; font-size: 14px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-top">

    <div class="chat-container">

            <!-- ⚡ Header Glowing Mini Logo -->

                        <linearGradient id="nexoraGradWelcome" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#10a37f" />
                            <stop offset="50%" stop-color="#4285f4" />

                tagline: "शेयर बाजार और सामान्य ज्ञान केंद्र",
                placeholder: "नेक्सोरा AI को संदेश भेजें...",
                systemPrompt: "You are Nexora AI, a multi-model professional assistant created and developed by PRINCE LAKHANI. You have deep knowledge of the Stock Market (BSE, NSE, Demat Accounts, Trading, Nifty, Sensex). Reply entirely in Hindi language. Format cleanly using bold tags and lists.",
                emptyChatTitle: "नई चैट",
                editBtn: "✏️ एडिट",
                copyBtn: "📋 कॉपी करें",
                error: "कनेक्शन एरर, कृपया पुनः प्रयास करें।",
                cards: [
                    { q: "स्टॉक मार्केट क्या है और यह कैसे काम करता है?", title: "📊 शेयर बाजार की बुनियादी बातें", desc: "NSE, BSE, Nifty और Sensex की पूरी जानकारी" },
                    { q: "डीमैट अकाउंट क्या है और इसे कैसे खोलें?", title: "💳 डीमैट और ट्रेडिंग अकाउंट", desc: "निवेश शुरू करने के लिए जरूरी कदम" },
                    { q: "स्टॉक मार्केट में निवेश करते समय किन बातों का ध्यान रखना चाहिए?", title: "💡 सुरक्षित निवेश टिप्स", desc: "जोखिम और बचने के सुनहरे नियम" },
                    { q: "तुम्हें किसने बनाया है और आपका डेवलपर कौन है?", title: "👑 डेवलपर प्रोफाइल (Prince Lakhani)", desc: "करियर और ओनरशिप जानकारी" }
                ]
            }
        };

        window.onload = function() {
            const savedLang = localStorage.getItem('nexora_lang') || 'gu';
            document.getElementById('langSelector').value = savedLang;
            currentLang = savedLang;
            applyLanguageUI();

            const savedData = localStorage.getItem('nexora_chats');
            if(savedData) {
                allChats = JSON.parse(savedData);
                const keys = Object.keys(allChats);
                if(keys.length > 0) {
                    renderHistoryList();
                    loadChat(keys[keys.length - 1]);
                } else { createNewChat(); }
            } else { createNewChat(); }

            if(localStorage.getItem('nexora_theme') === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeBtn').innerText = "☀️";
            }
        };

        function changeLanguage() {
            const selectedLang = document.getElementById('langSelector').value;
            currentLang = selectedLang;
            localStorage.setItem('nexora_lang', selectedLang);
            applyLanguageUI();
            
            if(allChats[currentChatId]) {
                allChats[currentChatId].history[0].content = languages[currentLang].systemPrompt;
            }
        }

        function applyLanguageUI() {
            const data = languages[currentLang];
            document.getElementById('logoText').querySelector('.brand-logo').innerText = data.logo;
            document.getElementById('headerWorkspace').innerText = data.workspace;
            document.getElementById('btnNewChat').innerText = data.newChat;
            document.getElementById('historyLabel').innerText = data.history;
            document.getElementById('taglineText').innerText = data.tagline;
            document.getElementById('userInput').setAttribute('placeholder', data.placeholder);

            const cardGrid = document.getElementById('cardsGrid');
            cardGrid.innerHTML = "";
            data.cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'suggest-card';
                cardDiv.onclick = () => quickSend(card.q);
                cardDiv.innerHTML = `${card.title} <span>${card.desc}</span>`;
                cardGrid.appendChild(cardDiv);
            });
        }

        function saveToStorage() {
            localStorage.setItem('nexora_chats', JSON.stringify(allChats));
        }

        function createNewChat() {
            currentChatId = 'chat_' + Date.now();
            allChats[currentChatId] = {
                title: languages[currentLang].emptyChatTitle,
                history: [{ role: "system", content: languages[currentLang].systemPrompt }],
                htmlContent: "", 
                showWelcome: true
            };
            saveToStorage();
            renderHistoryList();
            loadChat(currentChatId);
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = allChats[chatId];
            const welcome = document.getElementById('welcomeScreen');
            const msgs = document.getElementById('chatMessages');

            if(chat.showWelcome) {
                welcome.style.display = "flex";
                msgs.style.display = "none";
                msgs.innerHTML = "";
            } else {
                welcome.style.display = "none";
                msgs.style.display = "flex";
                msgs.innerHTML = chat.htmlContent;
            }
            
            document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
            const activeItem = document.getElementById(chatId);
            if(activeItem) activeItem.classList.add('active');
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            delete allChats[chatId];
            saveToStorage();
            const remaining = Object.keys(allChats);
            if (remaining.length === 0) {
                createNewChat();
            } else if (currentChatId === chatId) {
                loadChat(remaining[remaining.length - 1]);
            } else { renderHistoryList(); }
        }

        function renderHistoryList() {
            const container = document.getElementById('historySection');
            container.innerHTML = "";
            Object.keys(allChats).reverse().forEach(chatId => {
                const chat = allChats[chatId];
                const item = document.createElement('div');
                item.className = `history-item ${chatId === currentChatId ? 'active' : ''}`;
                item.id = chatId;
                item.onclick = () => loadChat(chatId);
                item.innerHTML = `
                    <div class="history-text">💬 ${chat.title}</div>
                    <button class="delete-history-btn" onclick="deleteChat('${chatId}', event)">🗑️</button>
                `;
                container.appendChild(item);
            });
        }

        function formatAIResponse(text) {
            let formatted = text.replace(/```([\s\S]*?)```/g, '<pre><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>$1</code></pre>');
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            formatted = formatted.replace(/^\*\s(.*)$/gm, '<li>$1</li>');
            
            formatted = formatted.split('\n').map(line => {
                if (line.trim().startsWith('<li>') || line.trim().startsWith('<pre>') || line.trim().startsWith('</pre>') || line.trim().startsWith('<code>') || line.trim().startsWith('<b>')) return line;
                return line.trim() === "" ? "<br>" : `<p>${line}</p>`;
            }).join('');
            return formatted;
        }

        function streamText(container, fullText, chatId, actionArea) {
            container.classList.add('live-typing-cursor');
            let i = 0;
            const chatMessages = document.getElementById('chatMessages');

            let timer = setInterval(() => {
                if (i <= fullText.length) {
                    container.innerHTML = formatAIResponse(fullText.substring(0, i));
                    i += 2;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    allChats[chatId].htmlContent = chatMessages.innerHTML;
                } else {
                    clearInterval(timer);
                    container.classList.remove('live-typing-cursor');
                    container.innerHTML = formatAIResponse(fullText);
                    actionArea.style.display = "flex"; 
                    allChats[chatId].htmlContent = chatMessages.innerHTML;
                    saveToStorage();
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }, 8);
        }

        function quickSend(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function editUserMessage(btn) {
            const textBlock = btn.closest('.message-content').querySelector('.text-block');
            document.getElementById('userInput').value = textBlock.innerText.trim();
            document.getElementById('userInput').focus();
        }

        function copyAIMessage(btn) {
            const textBlock = btn.closest('.message-content').querySelector('.text-block');
            let cleanText = textBlock.innerText.replace(/Copy\n/g, ""); 
            navigator.clipboard.writeText(cleanText);
            
            const originalText = btn.innerHTML;
            btn.innerHTML = "📋 Copied!";
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const messageText = inputField.value.trim();
            if (messageText === "") return;

            const welcome = document.getElementById('welcomeScreen');
            const chatMessages = document.getElementById('chatMessages');
            const activeChatId = currentChatId;
            const chosenModel = document.getElementById('modelSelector').value;
            const t = languages[currentLang];

            if(allChats[activeChatId].showWelcome) {
                allChats[activeChatId].showWelcome = false;
                welcome.style.display = "none";
                chatMessages.style.display = "flex";
            }

            if(allChats[activeChatId].title === t.emptyChatTitle || allChats[activeChatId].title === "નવી ચેટ" || allChats[activeChatId].title === "New Chat" || allChats[activeChatId].title === "नई चैट") {
                allChats[activeChatId].title = messageText.length > 15 ? messageText.substring(0, 14) + "..." : messageText;
                renderHistoryList();
            }

            const userRow = document.createElement('div');
            userRow.className = 'message-row user-row';
            userRow.innerHTML = `
                <div class="message-content">
                    <div class="message-main-body">
                        <div class="text-block">${messageText}</div>
                    </div>
                    <div class="msg-action-area">
                        <button class="action-link" onclick="editUserMessage(this)">${t.editBtn}</button>
                    </div>
                </div>`;
            chatMessages.appendChild(userRow);
            
            inputField.value = "";
            chatMessages.scrollTop = chatMessages.scrollHeight;

            allChats[activeChatId].history.push({ role: "user", content: messageText });
            allChats[activeChatId].htmlContent = chatMessages.innerHTML;

            const aiRow = document.createElement('div');
            aiRow.className = 'message-row ai-row';
            aiRow.innerHTML = `
                <div class="message-content">
                    <div class="message-main-body">
                        <div class="avatar ai-avatar">✦</div>
                        <div class="text-block">
                            <div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                        </div>
                    </div>
                    <div class="msg-action-area" style="display:none;">
                        <button class="action-link" onclick="copyAIMessage(this)">${t.copyBtn}</button>
                    </div>
                </div>`;
            chatMessages.appendChild(aiRow);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const targetContainer = aiRow.querySelector('.text-block');
            const actionArea = aiRow.querySelector('.msg-action-area');

            try {
                let contextPrompt = "";
                allChats[activeChatId].history.forEach(msg => {
                    if(msg.role === "system") contextPrompt += `System: ${msg.content}\n`;
                    if(msg.role === "user") contextPrompt += `User: ${msg.content}\n`;
                    if(msg.role === "assistant") contextPrompt += `AI: ${msg.content}\n`;
                });
                contextPrompt += "AI:";

                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(contextPrompt)}?model=${chosenModel}&cache=true`);
                if (!response.ok) throw new Error();
                
                const aiResponse = await response.text();
                
                targetContainer.innerHTML = "";
                streamText(targetContainer, aiResponse, activeChatId, actionArea);
                allChats[activeChatId].history.push({ role: "assistant", content: aiResponse });

            } catch (error) {
                targetContainer.innerHTML = t.error;
                allChats[activeChatId].htmlContent = chatMessages.innerHTML;
            }
        }

        function startVoice() {
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                
                if (currentLang === 'gu') recognition.lang = 'gu-IN';
                else if (currentLang === 'hi') recognition.lang = 'hi-IN';
                else recognition.lang = 'en-US';

                recognition.onstart = () => { document.getElementById('voiceBtn').innerText = "🛑"; };
                recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
                recognition.onend = () => { document.getElementById('voiceBtn').innerText = "🎙️"; };
                recognition.start();
            } else { 
                alert(currentLang === 'gu' ? "આ બ્રાઉઝરમાં માઇક સપોર્ટ નથી." : (currentLang === 'hi' ? "इस ब्राउज़र में माइक सपोर्ट नहीं है।" : "Voice support not available in this browser.")); 
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            document.getElementById('themeBtn').innerText = isLight ? "☀️" : "🌙";
            localStorage.setItem('nexora_theme', isLight ? 'light' : 'dark');
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code); btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }
    </script>
</body>
</html>
