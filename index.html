<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexora AI - Full Screen Premium Animated Workspace</title>
    
    <style>
        :root {
            --bg-body: #030306;
            --bg-sidebar: #07070c;
            --bg-chat: rgba(15, 15, 25, 0.45);
            --bg-user-msg: linear-gradient(135deg, #1e1e2f, #11111a);
            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-green: #00ffaa;
            --accent-glow: rgba(0, 255, 170, 0.2);
            --border-color: rgba(255, 255, 255, 0.06);
            --card-hover: rgba(22, 22, 36, 0.8);
            --neon-purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.15);
            --neon-blue: #3b82f6;
        }

        body.light-mode {
            --bg-body: #f8fafc;
            --bg-sidebar: #f1f5f9;
            --bg-chat: rgba(255, 255, 255, 0.75);
            --bg-user-msg: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            --text-main: #0f172a;
            --text-secondary: #64748b;
            --accent-green: #0d9488;
            --accent-glow: rgba(13, 148, 136, 0.1);
            --border-color: rgba(0, 0, 0, 0.06);
            --card-hover: rgba(241, 245, 249, 1);
            --neon-purple: #7c3aed;
            --purple-glow: rgba(124, 58, 237, 0.08);
            --neon-blue: #2563eb;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            display: flex; 
            height: 100vh; 
            height: 100dvh; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            overflow: hidden; 
            position: relative; 
            transition: background-color 0.4s ease;
        }
        
        /* 🌌 Real-Time Fluid Radial Backlighting Light Effect */
        .ambient-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden;
        }
        .light-sphere {
            position: absolute; border-radius: 50%; opacity: 0.35; filter: blur(140px); transform: translate3d(0,0,0);
        }
        .sphere-1 { background: var(--accent-green); width: 500px; height: 500px; top: -150px; right: -100px; animation: floatSphere1 18s infinite alternate ease-in-out; }
        .sphere-2 { background: var(--neon-purple); width: 600px; height: 600px; bottom: -200px; left: -150px; animation: floatSphere2 22s infinite alternate ease-in-out; }

        @keyframes floatSphere1 {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(-100px, 80px, 0) scale(1.2); }
        }
        @keyframes floatSphere2 {
            0% { transform: translate3d(0, 0, 0) scale(1.1); }
            100% { transform: translate3d(120px, -120px, 0) scale(0.9); }
        }

        /* 🔐 Premium Glassmorphism Auth Overlay */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 3, 6, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background: var(--bg-chat); border: 1px solid var(--border-color); padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); transform: translateY(30px); opacity: 0; animation: animFadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; position: relative; }
        
        @keyframes animFadeUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-dismiss-btn { position: absolute; top: 18px; right: 22px; background: transparent; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; transition: transform 0.3s ease; }
        .auth-dismiss-btn:hover { color: #ff4a4a; transform: scale(1.2) rotate(90deg); }
        .auth-input { background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); padding: 14px 18px; border-radius: 14px; color: var(--text-main); font-size: 15px; outline: none; width: 100%; margin-bottom: 12px; transition: all 0.3s; }
        .auth-input:focus { border-color: var(--accent-green); box-shadow: 0 0 15px var(--accent-glow); }
        .auth-btn { background: linear-gradient(135deg, var(--accent-green), var(--neon-blue)); color: #000; border: none; padding: 15px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: transform 0.2s, box-shadow 0.2s; }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }
        
        .auth-error { color: #ff4a4a; font-size: 13px; font-weight: 600; margin-bottom: 12px; display: none; text-align: left; padding-left: 4px; }

        /* 👑 High End Floating Glass Sidebar Component */
        .sidebar { 
            width: 275px; background-color: var(--bg-sidebar); padding: 24px 16px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--border-color); z-index: 100; flex-shrink: 0;
            transform: translate3d(0, 0, 0); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar-top { display: flex; flex-direction: column; gap: 20px; height: calc(100% - 120px); }
        .logo-container { display: flex; align-items: center; gap: 12px; justify-content: center; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .glowing-svg { filter: drop-shadow(0 0 8px var(--accent-green)); animation: breathGlow 4s infinite alternate ease-in-out; }
        @keyframes breathGlow { 0% { opacity: 0.7; } 100% { opacity: 1; filter: drop-shadow(0 0 16px var(--neon-blue)); } }
        .brand-logo { font-size: 23px; font-weight: 800; background: linear-gradient(90deg, var(--text-main), var(--accent-green), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        
        .new-chat-btn { background: rgba(255,255,255,0.02); color: var(--text-main); border: 1px solid var(--border-color); padding: 14px; border-radius: 14px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; transition: all 0.3s cubic-bezier(0.2, 1, 0.2, 1); }
        .new-chat-btn:hover { background: var(--card-hover); border-color: var(--accent-green); box-shadow: 0 0 15px rgba(0,255,170,0.15); transform: translateY(-2px); }
        
        .history-section { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .history-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin: 15px 0 5px 4px; letter-spacing: 0.5px; }
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 12px; border-radius: 10px; cursor: pointer; color: var(--text-main); font-size: 14px; transition: all 0.25s ease; }
        .history-item:hover { background-color: var(--card-hover); padding-left: 16px; }
        .history-item.active { background-color: var(--card-hover); border-left: 3px solid var(--accent-green); }
        .history-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 80%; }
        .delete-history-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; opacity: 0; }
        .history-item:hover .delete-history-btn { opacity: 0.7; }
        .delete-history-btn:hover { color: #ff4a4a !important; opacity: 1 !important; }

        .sidebar-footer { padding: 16px 4px 0 4px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .dev-badge { font-size: 10px; font-weight: 800; background: linear-gradient(135deg, var(--accent-green), var(--neon-blue)); color: #000; padding: 5px 8px; border-radius: 6px; text-align: center; font-weight: bold; }
        .logout-btn { background: transparent; border: 1px solid rgba(255, 74, 74, 0.2); color: #ff4a4a; padding: 9px; border-radius: 10px; cursor: pointer; font-weight: 600; text-align: center; transition: all 0.2s; }
        .logout-btn:hover { background: #ff4a4a; color: white; box-shadow: 0 4px 15px rgba(255, 74, 74, 0.3); }

        /* 💬 Core Layout Container Canvas */
        .chat-container { flex: 1; display: flex; flex-direction: column; height: 100%; background-color: transparent; position: relative; min-width: 0; z-index: 2; }
        .chat-header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; background-color: rgba(3, 3, 6, 0.35); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); }
        .menu-toggle { display: none; background: transparent; border: none; color: var(--text-main); font-size: 22px; cursor: pointer; }
        
        .model-select, .lang-select { background: rgba(15,15,25,0.7); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 20px; font-size: 13px; outline: none; cursor: pointer; transition: all 0.3s; }
        .model-select:hover, .lang-select:hover { border-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-glow); }
        .theme-toggle { background: transparent; border: none; font-size: 19px; cursor: pointer; color: var(--text-main); padding: 4px; transition: transform 0.3s ease; }
        .theme-toggle:hover { transform: scale(1.15) rotate(15deg); }

        /* ✨ UI Dashboard Interaction Layout */
        .welcome-screen { 
            position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 740px; padding: 0 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 26px;
            opacity: 0; transform: translate(-50%, -45%) scale(0.97); animation: smoothReveal 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes smoothReveal {
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .welcome-logo { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, var(--text-main), var(--accent-green), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 12px rgba(0,255,170,0.15)); letter-spacing: -1px; }
        .welcome-tagline { font-size: 18px; font-weight: 500; color: var(--text-secondary); }
        
        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; margin-top: 10px; }
        .suggest-card { 
            background: var(--bg-chat); border: 1px solid var(--border-color); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; padding: 22px; text-align: left; cursor: pointer; font-size: 15px; font-weight: 600; position: relative; overflow: hidden;
            transform: translate3d(0,0,0); transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .suggest-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); }
        .suggest-card:hover::before { animation: flashThrough 0.7s ease-in-out forwards; }
        @keyframes flashThrough { to { left: 150%; } }
        
        .suggest-card:hover { border-color: var(--accent-green); background: var(--card-hover); transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.3), 0 0 15px var(--accent-glow); }
        .suggest-card span { display: block; font-size: 13px; color: var(--text-secondary); margin-top: 6px; font-weight: 400; }

        /* 📨 Full Width Message Canvas Architecture */
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px 30px 150px 30px; display: flex; flex-direction: column; scroll-behavior: smooth; width: 100%; }
        
        .message-row { 
            width: 100%; display: flex; padding: 14px 0; justify-content: flex-start;
            opacity: 0; transform: translate3d(0, 20px, 0); animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideInUp { to { opacity: 1; transform: translate3d(0, 0, 0); } }

        .message-content { width: 100%; display: flex; gap: 18px; flex-direction: column; }
        .message-main-body { display: flex; gap: 16px; width: 100%; align-items: flex-start; }
        
        .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
        .ai-avatar { background: linear-gradient(135deg, var(--accent-green), var(--neon-blue)); color: #000; filter: drop-shadow(0 0 6px var(--accent-glow)); font-weight: bold; }
        .user-avatar { background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-main); }
        
        .text-block { flex: 1; color: var(--text-main); font-size: 16px; line-height: 1.7; word-wrap: break-word; overflow-wrap: break-word; width: 100%; }
        
        /* User Row Full Screen Design */
        .user-row .text-block { background: var(--bg-user-msg); padding: 16px 22px; border-radius: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.02); }

        pre { background-color: #040408; color: #e3e3e3; padding: 16px; border-radius: 12px; margin: 14px 0; overflow-x: auto; position: relative; font-family: monospace; border: 1px solid var(--border-color); width: 100%; }
        .copy-btn { position: absolute; right: 12px; top: 12px; background: #141420; border: none; color: #b4b4b4; padding: 5px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        /* ⌨️ Lower Fullscreen Dock Input Frame Bar Area */
        .chat-input-area { position: absolute; bottom: 0; left: 0; width: 100%; padding: 16px 30px 30px 30px; background: linear-gradient(transparent, var(--bg-body) 45%); display: flex; justify-content: center; z-index: 50; }
        .input-wrapper { width: 100%; background: rgba(14, 14, 22, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 28px; padding: 8px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .input-wrapper:focus-within { transform: translateY(-2px); border-color: var(--accent-green); box-shadow: 0 0 20px var(--accent-glow), 0 10px 30px rgba(0,0,0,0.4); }
        
        .chat-input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 16px; outline: none; padding: 8px 4px; }
        .icon-btn { background: transparent; border: none; color: var(--text-secondary); width: 40px; height: 40px; font-size: 19px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .icon-btn:hover { color: var(--accent-green); background: rgba(0, 255, 170, 0.06); }
        
        .send-btn { background-color: var(--text-main); color: var(--bg-body); width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .chat-input:not(:placeholder-shown) ~ .send-btn { background: linear-gradient(135deg, var(--accent-green), var(--neon-blue)); color: #000; transform: rotate(360deg); box-shadow: 0 0 12px var(--accent-glow); }

        /* ✨ Typing Elements */
        .typing-dots { display: inline-flex; gap: 5px; align-items: center; height: 20px; padding-left: 6px; }
        .dot { width: 8px; height: 8px; background: linear-gradient(135deg, var(--accent-green), var(--neon-blue)); border-radius: 50%; animation: fluidBounce 1.3s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes fluidBounce { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-6px); opacity: 1; } }

        /* 📱 MOBILE ENGINE */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; left: -280px; top: 0; height: 100%; width: 275px; z-index: 1000; background-color: var(--bg-sidebar); box-shadow: 15px 0 45px rgba(0,0,0,0.6);
            }
            .sidebar.open { transform: translate3d(280px, 0, 0); }
            
            .sidebar-overlay { 
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 3, 6, 0.6); z-index: 900; opacity: 0; transition: opacity 0.35s ease; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            }
            .sidebar-overlay.active { display: block; opacity: 1; }
            
            .menu-toggle { display: block; }
            .cards-grid { grid-template-columns: 1fr; gap: 12px; }
            .welcome-screen { top: 45%; padding: 0 16px; gap: 22px; }
            .welcome-logo { font-size: 38px; }
            .chat-messages { padding: 16px 16px 135px 16px; }
            .chat-input-area { padding: 12px 16px 22px 16px; }
        }
    </style>
</head>
<body>

    <div class="ambient-layer">
        <div class="light-sphere sphere-1"></div>
        <div class="light-sphere sphere-2"></div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <button class="auth-dismiss-btn" onclick="dismissAuth()">✕</button>
            <svg class="glowing-svg" width="50" height="50" viewBox="0 0 100 100" fill="none">
                <path d="M25 75V25L45 55L55 45L75 75V25" stroke="url(#authGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="authGrad"><stop offset="0%" stop-color="#00ffaa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
            </svg>
            <div class="auth-title" id="authTitle" style="font-size:24px; font-weight:800; margin-top:20px; margin-bottom:6px;">Nexora AI માં લોગિન કરો</div>
            <div class="auth-subtitle" id="authSubtitle" style="font-size:13px; color:var(--text-secondary); margin-bottom:24px;">તમારા એકાઉન્ટ વડે સાઇન ઇન કરો</div>
            
            <div class="auth-form">
                <div class="auth-error" id="authErrorMsg">खोळो ईमेळ अथवा पासवर्ड!</div>

                <div id="authNameRow" style="display: none; gap: 10px; margin-bottom: 0px;">
                    <input type="text" class="auth-input" id="authFirstName" placeholder="પ્રથમ નામ">
                    <input type="text" class="auth-input" id="authLastName" placeholder="અટક">
                </div>
                <input type="email" class="auth-input" id="authEmail" placeholder="ઈમેલ એડ્રેસ">
                <input type="password" class="auth-input" id="authPassword" placeholder="પાસવર્ડ">
                <input type="password" class="auth-input" id="authConfirmPassword" placeholder="કન્ફર્મ પાસવર્ડ" style="display: none;">
                <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">પ્રવેશ કરો</button>
            </div>
            <div class="auth-switch" style="margin-top:22px; font-size:14px; color:var(--text-secondary);">
                <span id="authSwitchText">એકાઉન્ટ નથી?</span> <a id="authSwitchBtn" onclick="toggleAuthMode()" style="color:var(--accent-green); font-weight:700; cursor:pointer;">નવું બનાવો</a>
            </div>
        </div>
    </div>

    <div class="sidebar" id="appSidebar">
        <div class="sidebar-top">
            <div class="logo-container">
                <svg class="glowing-svg" width="30" height="30" viewBox="0 0 100 100" fill="none">
                    <path d="M25 75V25L45 55L55 45L75 75V25" stroke="url(#nGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="nGrad"><stop offset="0%" stop-color="#00ffaa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
                </svg>
                <span class="brand-logo">Nexora AI</span>
            </div>
            <button class="new-chat-btn" onclick="createNewChat(); closeMenuOnMobile();">
                <span id="btnNewChat">📝 New chat</span>
                <span>➕</span>
            </button>
            <div class="history-label">તાજેતરનો ઇતિહાસ</div>
            <div class="history-section" id="historySection"></div>
        </div>
        <div class="sidebar-footer">
            <div class="dev-badge">🔧 PRINCE LAKHANI WORKSPACE</div>
            <span style="font-weight: 700; text-align: center;" id="userNameDisplay">GUEST USER</span>
            <button class="logout-btn" onclick="logout()">🔒 Reset Login</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle" onclick="toggleMenu()">☰</button>
                <div class="brand-logo" style="font-size:16px;" id="headerWorkspace">✦ નેક્સોરા AI વર્કસ્પેસ</div>
            </div>
            <div>
                <select class="lang-select" id="langSelector" onchange="changeLanguage()">
                    <option value="gu">🌐 ગુજ</option>
                    <option value="en">🌐 En</option>
                </select>
                <select class="model-select" id="modelSelector">
                    <option value="openai">🤖 ChatGPT</option>
                    <option value="gemini">✨ Gemini</option>
                    <option value="deepseek">🧠 DeepSeek</option>
                </select>
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
        
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-logo">Nexora AI</div>
            <div class="welcome-tagline" id="taglineText">સ્ટોક માર્કેટ અને જનરલ નોલેજ હબ</div>
            <div class="cards-grid" id="cardsGrid"></div>
        </div>

        <div class="chat-messages" id="chatMessages" style="display: none;"></div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <button class="icon-btn" id="voiceBtn" onclick="startVoice()">🎙️</button>
                <input type="text" class="chat-input" id="userInput" placeholder="Message Nexora AI..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <script>
        let allChats = {}; let currentChatId = null; let currentLang = 'gu'; let isSignUpMode = false;

        function toggleMenu() {
            document.getElementById('appSidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
        function closeMenuOnMobile() {
            document.getElementById('appSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        // --- Secure Auth System Engine ---
        function checkLoginStatus() {
            const isLoggedIn = sessionStorage.getItem('nexora_logged_in');
            const currentUser = sessionStorage.getItem('nexora_user');
            if (isLoggedIn === 'true' && currentUser) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('userNameDisplay').innerText = currentUser.toUpperCase();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        }

        function dismissAuth() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('userNameDisplay').innerText = "GUEST USER";
            sessionStorage.setItem('nexora_logged_in', 'false'); 
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authErrorMsg').style.display = 'none';
            document.getElementById('authNameRow').style.display = isSignUpMode ? 'flex' : 'none';
            document.getElementById('authConfirmPassword').style.display = isSignUpMode ? 'block' : 'none';
            
            document.getElementById('authTitle').innerText = isSignUpMode ? "નવું એકાઉન્ટ બનાવો" : "Nexora AI માં લોગિન કરો";
            document.getElementById('authSubtitle').innerText = isSignUpMode ? "તમારી ડિટેલ્સ ભરીને રજીસ્ટર કરો" : "તમારા એકાઉન્ટ વડે સાઇન ઇન કરો";
            document.getElementById('authSubmitBtn').innerText = isSignUpMode ? "એકાઉન્ટ બનાવો" : "પ્રવેશ કરો";
            document.getElementById('authSwitchText').innerText = isSignUpMode ? "પહેલેથી એકાઉન્ટ છે?" : "એકાઉન્ટ નથી?";
            document.getElementById('authSwitchBtn').innerText = isSignUpMode ? "લોગિન કરો" : "નવું બનાવો";
        }

        function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const errorLabel = document.getElementById('authErrorMsg');
            
            errorLabel.style.display = 'none';

            if (!email || !password) {
                errorLabel.innerText = "બધી ફિલ્ડ ભરવી ફરજિયાત છે!";
                errorLabel.style.display = 'block';
                return;
            }

            if (isSignUpMode) {
                const fname = document.getElementById('authFirstName').value.trim();
                const lname = document.getElementById('authLastName').value.trim();
                const confirmPassword = document.getElementById('authConfirmPassword').value.trim();

                if (!fname) {
                    errorLabel.innerText = "કૃપા કરીને તમારું નામ લખો!";
                    errorLabel.style.display = 'block';
                    return;
                }

                if (password !== confirmPassword) {
                    errorLabel.innerText = "પાસવર્ડ મેચ થતા નથી!";
                    errorLabel.style.display = 'block';
                    return;
                }

                const userObj = { name: fname + " " + lname, email: email, password: password };
                localStorage.setItem('user_' + email, JSON.stringify(userObj));

                sessionStorage.setItem('nexora_logged_in', 'true');
                sessionStorage.setItem('nexora_user', fname);
                checkLoginStatus();

            } else {
                const savedUserData = localStorage.getItem('user_' + email);
                
                if (!savedUserData) {
                    errorLabel.innerText = "આ ઈમેલ આઈડી રજીસ્ટર નથી!";
                    errorLabel.style.display = 'block';
                    return;
                }

                const parsedUser = JSON.parse(savedUserData);

                if (parsedUser.password === password) {
                    sessionStorage.setItem('nexora_logged_in', 'true');
                    sessionStorage.setItem('nexora_user', parsedUser.name.split(" ")[0]);
                    checkLoginStatus();
                } else {
                    errorLabel.innerText = "ખોટો પાસવર્ડ! કૃપા કરીને ફરી ટ્રાય કરો.";
                    errorLabel.style.display = 'block';
                }
            }
        }

        function logout() { sessionStorage.clear(); window.location.reload(); }

        const languages = {
            gu: { 
                workspace: "✦ નેક્સોરા AI વર્કસ્પેસ", newChat: "📝 નવી ચેટ", tagline: "સ્ટોક માર્કેટ અને જનરલ નોલેજ હબ", placeholder: "નેક્સોરા AI ને મેસેજ કરો...",
                cards: [
                    { q: "સ્ટોક માર્કેટ એટલે શું? તે કેવી રીતે કામ કરે છે?", title: "📊 શેર બજારનો ખ્યાલ", desc: "NSE, BSE, Nifty ની વિગત" }, 
                    { q: "ડીમેટ એકાઉન્ટ શું છે?", title: "💳 ડીમેટ એકાઉન્ટ", desc: "રોકાણ શરૂ કરવા જરૂરી સ્ટેપ્સ" }
                ] 
            },
            en: { 
                workspace: "✦ Nexora AI Workspace", newChat: "📝 New Chat", tagline: "Stock Market & GK Hub", placeholder: "Message Nexora AI...",
                cards: [
                    { q: "What is Stock Market?", title: "📊 Stock Basics", desc: "Guide of NSE & Nifty" }, 
                    { q: "What is Demat Account?", title: "💳 Demat Account", desc: "Essential steps to open" }
                ] 
            }
        };

        function changeLanguage() { currentLang = document.getElementById('langSelector').value; applyLanguageUI(); }

        function applyLanguageUI() {
            const d = languages[currentLang] || languages['en'];
            document.getElementById('headerWorkspace').innerText = d.workspace;
            document.getElementById('btnNewChat').innerText = d.newChat;
            document.getElementById('taglineText').innerText = d.tagline;
            document.getElementById('userInput').setAttribute('placeholder', d.placeholder);
            
            const grid = document.getElementById('cardsGrid'); grid.innerHTML = "";
            d.cards.forEach(c => {
                grid.innerHTML += `<div class="suggest-card" onclick="quickSend('${c.q}')">${c.title}<span>${c.desc}</span></div>`;
            });
        }

        function createNewChat() {
            currentChatId = 'chat_' + Date.now();
            allChats[currentChatId] = { title: currentLang === 'gu' ? "નવી ચેટ" : "New Chat", htmlContent: "", showWelcome: true };
            renderHistoryList(); loadChat(currentChatId);
        }

        function loadChat(chatId) {
            currentChatId = chatId; const chat = allChats[chatId];
            document.getElementById('welcomeScreen').style.display = chat.showWelcome ? "flex" : "none";
            document.getElementById('chatMessages').style.display = chat.showWelcome ? "none" : "flex";
            document.getElementById('chatMessages').innerHTML = chat.htmlContent;
            
            document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
            const activeElem = document.getElementById(chatId); if(activeElem) activeElem.classList.add('active');
        }

        function deleteChat(chatId, e) {
            e.stopPropagation(); delete allChats[chatId];
            const keys = Object.keys(allChats);
            if(keys.length === 0) createNewChat(); else { loadChat(keys[keys.length - 1]); renderHistoryList(); }
        }

        function renderHistoryList() {
            const container = document.getElementById('historySection'); container.innerHTML = "";
            Object.keys(allChats).reverse().forEach(id => {
                const activeClass = id === currentChatId ? 'active' : '';
                container.innerHTML += `
                    <div class="history-item ${activeClass}" id="${id}">
                        <div class="history-text" onclick="loadChat('${id}'); closeMenuOnMobile();">💬 ${allChats[id].title}</div>
                        <button class="delete-history-btn" onclick="deleteChat('${id}', event)">🗑️</button>
                    </div>`;
            });
        }

        function formatAIResponse(text) {
            let formatted = text.replace(/```([\s\S]*?)```/g, '<pre><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>$1</code></pre>');
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            return formatted.split('\n').map(l => l.trim() === "" ? "<br>" : `<p>${l}</p>`).join('');
        }

        async function sendMessage() {
            const field = document.getElementById('userInput'); const txt = field.value.trim(); if(!txt) return;
            field.value = "";
            
            const msgs = document.getElementById('chatMessages');
            if(allChats[currentChatId].showWelcome) {
                allChats[currentChatId].showWelcome = false;
                document.getElementById('welcomeScreen').style.display = "none"; msgs.style.display = "flex";
            }
            if(allChats[currentChatId].title === "નવી ચેટ" || allChats[currentChatId].title === "New Chat") {
                allChats[currentChatId].title = txt.substring(0, 15) + "...";
            }
            
            const currentUser = sessionStorage.getItem('nexora_user') || "U";
            const firstLetter = currentUser.charAt(0).toUpperCase();

            // Fullscreen User Row Template Layout
            msgs.innerHTML += `
                <div class="message-row user-row">
                    <div class="message-content">
                        <div class="message-main-body">
                            <div class="avatar user-avatar">${firstLetter}</div>
                            <div class="text-block">${txt}</div>
                        </div>
                    </div>
                </div>`;
            
            renderHistoryList(); msgs.scrollTop = msgs.scrollHeight;

            const aiRow = document.createElement('div'); aiRow.className = 'message-row ai-row';
            aiRow.innerHTML = `
                <div class="message-content">
                    <div class="message-main-body">
                        <div class="avatar ai-avatar">✦</div>
                        <div class="text-block"><div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
                    </div>
                </div>`;
            msgs.appendChild(aiRow); msgs.scrollTop = msgs.scrollHeight;

            try {
                const model = document.getElementById('modelSelector').value;
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(txt)}?model=${model}`);
                const reply = await res.text();
                aiRow.querySelector('.text-block').innerHTML = formatAIResponse(reply);
                allChats[currentChatId].htmlContent = msgs.innerHTML;
            } catch(e) { aiRow.querySelector('.text-block').innerHTML = "Error occurred."; }
            msgs.scrollTop = msgs.scrollHeight;
        }

        function quickSend(t) { document.getElementById('userInput').value = t; sendMessage(); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function copyCode(b) { navigator.clipboard.writeText(b.nextElementSibling.innerText); b.innerText = "Copied!"; setTimeout(() => b.innerText="Copy", 2000); }
        
        function startVoice() {
            if ('webkitSpeechRecognition' in window) {
                const r = new webkitSpeechRecognition(); r.lang = currentLang === 'gu' ? 'gu-IN' : 'en-US';
                r.onstart = () => document.getElementById('voiceBtn').innerText = "🛑";
                r.onresult = (e) => document.getElementById('userInput').value = e.results[0][0].transcript;
                r.onend = () => document.getElementById('voiceBtn').innerText = "🎙️"; r.start();
            }
        }

        window.onload = () => { checkLoginStatus(); applyLanguageUI(); createNewChat(); }
    </script>
</body>
</html>
